name: Deploy to PythonAnywhere

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest
steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Pull latest code on PythonAnywhere
    run: |
      curl -s -X POST \
        --data "input=cd ~/vittasastra && git pull origin main\n" \
        -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
        https://eu.pythonanywhere.com/api/v0/user/SubhasishSahu/consoles/

  - name: Wait for pull to complete
    run: sleep 15

  - name: Reload PythonAnywhere web app
    run: |
      curl -s -X POST \
        -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
        https://eu.pythonanywhere.com/api/v0/user/SubhasishSahu/webapps/SubhasishSahu.eu.pythonanywhere.com/reload/

  - name: Confirm reload
    run: |
      echo "Deploy triggered at $(date)"
      echo "PA web app reload requested for SubhasishSahu.eu.pythonanywhere.com"
